# nfpm config — builds .deb (Ubuntu) and .rpm (Fedora) from the prebuilt binaries.
# Usage (from the repo root, after `go build` of both binaries):
#   nfpm pkg --config packaging/nfpm.yaml --packager deb --target dist/
#   nfpm pkg --config packaging/nfpm.yaml --packager rpm --target dist/
name: files-signer
arch: amd64
platform: linux
version: 0.1.0
section: utils
priority: optional
maintainer: Ruddy Quispe <development.rquispe@gmail.com>
description: |
  Sign, verify and extract files with PKCS#7/CMS digital signatures.
  Desktop app and CLI. Cross-platform alternative to XolidoSign.
homepage: https://github.com/rquispe/files-signer
license: MIT

contents:
  - src: ./files-signer
    dst: /usr/bin/files-signer
  - src: ./files-signer-gui
    dst: /usr/bin/files-signer-gui
  - src: ./packaging/com.rquispe.filessigner.desktop
    dst: /usr/share/applications/com.rquispe.filessigner.desktop
  - src: ./packaging/com.rquispe.filessigner.metainfo.xml
    dst: /usr/share/metainfo/com.rquispe.filessigner.metainfo.xml
  - src: ./assets/icon-512.png
    dst: /usr/share/icons/hicolor/512x512/apps/com.rquispe.filessigner.png
  - src: ./assets/icon-256.png
    dst: /usr/share/icons/hicolor/256x256/apps/com.rquispe.filessigner.png
  - src: ./assets/icon-128.png
    dst: /usr/share/icons/hicolor/128x128/apps/com.rquispe.filessigner.png
  - src: ./assets/icon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/com.rquispe.filessigner.svg

overrides:
  rpm:
    depends:
      - mesa-libGL
      - libX11
      - zenity
  deb:
    depends:
      - libgl1
      - libx11-6
      - zenity
